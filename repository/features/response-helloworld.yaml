name: response-helloworld
displayName: "Hello World Feature"
type: feature
description: |
  If the proxy response is JSON, then a message property is added to the payload.

  **Prerequisites**
  - None.

  **Inputs**
  - An optional 'message' property is either sent as query parameter or retrieved from the properties file.

  **Outputs**
  - If the response is JSON, then a "message" property is added, or if the response is text, the message is concatenated.
categories:
  - traffic
parameters:
  - name: MESSAGE
    displayName: MESSAGE
    description: Configuration input for MESSAGE
    default: Hello world!
    examples:
      - Hello mars!
      - Hello internet!
defaultEndpoint:
  name: default
  basePath: /helloworld
  routes:
    - name: default
  flows:
    - name: PostFlow
      mode: Response
      steps:
        - name: JS-AddHelloWorld
  faultRules: []
endpoints: []
targets: []
policies:
  - name: JS-AddHelloWorld
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-AddHelloWorld
        displayName: JS-AddHelloWorld
        properties: {}
        resourceUrl: jsc://hello-world.js
resources:
  - name: hello-world.js
    type: jsc
    content: |-
      var responseText = response.content;
      if (!responseText) responseText = "";

      var responseObject = undefined;

      try {
        responseObject = JSON.parse(responseText);
      } catch(e) {
        print("Could not parse JSON.");
      }

      var message = context.getVariable("request.queryparam.message");
      if (!message)
        message = context.getVariable("propertyset.helloworld.MESSAGE");
      if (!message)
        message = "Hello world!";

      if (responseObject) {
        responseObject["message"] = message;
        context.setVariable("response.content", JSON.stringify(responseObject));
      } else {
        responseText = responseText + " " + message;
        context.setVariable("response.content", responseText);
      }
  - name: helloworld.properties
    type: properties
    content: |
      MESSAGE={MESSAGE}
tests: []
