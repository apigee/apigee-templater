name: target-mcp-deepwiki
displayName: ""
type: feature
description: Feature-PROXY-DeepWiki-v1
categories:
  - services
parameters: []
endpoints:
  - name: deepwiki
    basePath: /v1/deepwiki
    routes:
      - name: default
        target: deepwiki
    flows: []
    faultRules: []
targets:
  - name: deepwiki
    url: https://mcp.deepwiki.com
    flows:
      - name: PreFlow
        mode: Request
        steps:
          - name: AM-SetEncoding
      - name: EventFlow
        mode: Response
        steps: []
    faultRules: []
    httpTargetConnection:
      properties: {}
      url: https://mcp.deepwiki.com
policies:
  - name: AM-SetEncoding
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetEncoding
        displayName: AM-SetEncoding
        properties: {}
        set:
          headers:
            header:
              metadata:
                name: Accept-Encoding
              text: gzip,deflate
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
resources: []
tests: []
