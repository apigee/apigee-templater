name: llm-vertex-openmodel
displayName: LLM Vertex AI Open Model Target
type: feature
description: Targets the Vertex AI Open Models using the Chat Completions Messages API (OAI compatible).
categories:
  - llm
  - ai
parameters:
  - name: MODEL
    displayName: MODEL
    description: Configuration input for MODEL
    default: gemini
    maps:
      gemini: google/gemini-flash-latest
      qwen: qwen/qwen3-next-80b-a3b-thinking-maas
      kimi: moonshotai/kimi-k2-thinking-maas
      gpt: openai/gpt-oss-120b-maas
      deepseek: deepseek-ai/deepseek-v3.2-maas
    examples:
      - google/gemini-flash-latest
      - google/gemini-2.5-pro
      - google/gemini-3.1-pro-preview
      - qwen/qwen3-next-80b-a3b-thinking-maas
      - moonshotai/kimi-k2-thinking-maas
      - openai/gpt-oss-120b-maas
      - deepseek-ai/deepseek-v3.2-maas
  - name: MODEL_FALLBACK
    displayName: MODEL_FALLBACK
    description: Configuration input for MODEL_FALLBACK
    default: google/gemini-2.5-flash
    maps:
      gemini: google/gemini-flash-latest
      qwen: qwen/qwen3-next-80b-a3b-thinking-maas
      kimi: moonshotai/kimi-k2-thinking-maas
      gpt: openai/gpt-oss-120b-maas
      deepseek: deepseek-ai/deepseek-v3.2-maas
    examples:
      - google/gemini-flash-latest
      - google/gemini-2.5-pro
      - google/gemini-3.1-pro-preview
      - qwen/qwen3-next-80b-a3b-thinking-maas
      - moonshotai/kimi-k2-thinking-maas
      - openai/gpt-oss-120b-maas
      - deepseek-ai/deepseek-v3.2-maas
  - name: BASE_PATH
    paths:
      - $.endpoints[:1].basePath
    displayName: BASE_PATH
    description: The base path on the proxy to receive traffic.
    default: /v1/chat/completions
    examples:
      - /llm
      - /llm/gemini
      - /llm/qwen
endpoints:
  - name: vertex
    basePath: /v1/chat/completions
    routes:
      - name: default
        target: vertex
    flows:
      - name: PreFlow
        mode: Request
        steps:
          - name: JS-SetModel
    faultRules: []
targets:
  - name: vertex
    url: https://aiplatform.googleapis.com/v1/projects/{organization.name}/locations/global/endpoints/openapi/chat/completions
    auth: GoogleAccessToken
    scopes:
      - https://www.googleapis.com/auth/cloud-platform
    flows: []
    faultRules: []
    defaultFaultRule:
      name: default-fault
      steps:
        - name: JS-SetModelBackup
        - name: SC-FallbackModel
        - name: AM-SetFallbackResponse
    httpTargetConnection:
      properties: {}
      url: https://aiplatform.googleapis.com/v1/projects/{organization.name}/locations/global/endpoints/openapi/chat/completions
      authentication:
        googleAccessToken:
          scopes:
            scope: https://www.googleapis.com/auth/cloud-platform
policies:
  - name: AM-SetFallbackResponse
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetFallbackResponse
        displayName: AM-SetFallbackResponse
        properties: {}
        copy:
          metadata:
            source: fallbackResponse
          headers: {}
          payload: "true"
          statusCode: "true"
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: response
  - name: JS-SetModelBackup
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetModelBackup
        displayName: JS-SetModelBackup
        properties: {}
        resourceUrl: jsc://set-model-backup.js
  - name: SC-FallbackModel
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-FallbackModel
        displayName: SC-FallbackModel
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: fallbackRequest
          set:
            verb: POST
            payload: "{request.content}"
            headers:
              header:
                metadata:
                  name: Content-Type
                value: application/json
        response: fallbackResponse
        httpTargetConnection:
          properties: {}
          url: https://aiplatform.googleapis.com/v1/projects/{organization.name}/locations/global/endpoints/openapi/chat/completions
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
  - name: JS-SetModel
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetModel
        displayName: JS-SetModel
        properties: {}
        resourceUrl: jsc://set-model.js
resources:
  - name: set-model-backup.js
    type: jsc
    content: |-
      var requestObject = request.content.asJSON;
      var model = context.getVariable("propertyset.vertexai.MODEL_FALLBACK");

      if (requestObject) {
        requestObject["model"] = model;
      }

      context.setVariable('request.content', JSON.stringify(requestObject));
  - name: set-model.js
    type: jsc
    content: |-
      var requestObject = request.content.asJSON;
      var model = context.getVariable("propertyset.vertexai.MODEL");

      if (requestObject) {
        requestObject["model"] = model;
      }

      context.setVariable('request.content', JSON.stringify(requestObject));
  - name: vertexai.properties
    type: properties
    content: |
      MODEL={MODEL}
      MODEL_FALLBACK={MODEL_FALLBACK}
tests: []
