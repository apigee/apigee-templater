name: target-httpbin
displayName: HttpBin Proxy
type: feature
description: Add a target to httpbin.org to your proxy.
categories:
  - services
parameters:
  - name: BASE_PATH
    displayName: BASE_PATH
    description: The base path on the proxy to receive traffic.
    paths:
      - $.endpoints[:1].basePath
    default: /v1/httpbin
    examples:
      - /v1/httpbin
      - /httpbin
      - /llm/httpbin
endpoints:
  - name: httpbin
    basePath: /v1/httpbin
    routes:
      - name: default
        target: httpbin
    flows: []
    faultRules: []
targets:
  - name: httpbin
    url: https://httpbin.org
    flows: []
    faultRules: []
    httpTargetConnection:
      properties: {}
      url: https://httpbin.org
policies: []
resources: []
tests: []
