name: ai-vertex-native
displayName: Gemini Target
type: feature
description: Targets the Gemini native API endpoint for proxying Gemini requests.
documentation: ""
categories:
  - llm
  - ai
parameters: []
endpoints:
  - name: gemini
    basePath: /gemini
    routes:
      - name: default
        target: gemini
    flows: []
    faultRules: []
targets:
  - name: gemini
    url: https://generativelanguage.googleapis.com
    flows: []
    faultRules: []
    httpTargetConnection:
      properties:
        - property:
            metadata:
              name: io.timeout.millis
            value: "18000000"
      url: https://generativelanguage.googleapis.com
policies: []
resources: []
tests: []
