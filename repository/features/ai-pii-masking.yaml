name: ai-pii-masking
displayName: AI PII Masking
type: feature
description: Adds automatic PII data masking to the AI request prompt.
documentation: |
  This feature masks PII data email addresses and telephone numbers from
  incoming prompt requests using GCP Data Loss Prevention.

  **Prerequisites**
  - Enable DLP in your GCP project. You can do this with this command:
  ```sh
  gcloud services enable dlp.googleapis.com
  ```
categories:
  - llm
parameters: []
defaultEndpoint:
  name: default
  basePath: /piimasking
  routes:
    - name: default
      target: default
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: KVM-LoadConfig
        - name: AM-SetVariables
        - name: JS-CheckModel
        - name: AM-SetText
        - name: SC-SensitiveDataProtection
          condition: sdp.text != null
        - name: JS-SetMaskedRequest
          condition: sdp.text != null
    - name: PostFlow
      mode: Response
      steps:
        - name: JS-GetResponse
        - name: SC-SensitiveDataProtection
        - name: JS-SetResponse
  faultRules: []
defaultTarget:
  name: default
  url: https://aiplatform.googleapis.com
  flows:
    - name: PostFlow
      mode: Response
      steps:
        - name: JS-Analytics
          condition: response.content != ""
    - name: EventFlow
      mode: Response
      steps:
        - name: JS-Analytics
          condition: ai.responseTokenCount == null
  faultRules: []
  httpTargetConnection:
    properties: {}
    url: https://aiplatform.googleapis.com
endpoints: []
targets: []
policies:
  - name: AM-SetText
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "false"
          name: AM-SetText
        displayName: AM-SetText
        properties: {}
        assignVariable:
          name: sdp.text
          ref: ai.requestPrompt
        ignoreUnresolvedVariables: "true"
  - name: AM-SetVariables
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetVariables
        displayName: AM-SetVariables
        properties: {}
        remove:
          headers:
            header:
              metadata:
                name: accept-encoding
        assignVariable:
          name: originalHostName
          ref: request.header.host
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: JS-Analytics
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-Analytics
        displayName: JS-Analytics
        properties: {}
        source: |
          var contentString = context.getVariable("response.event.current.content");
          var type = "streaming";
          if (!contentString) {
            contentString = context.getVariable("response.content");
            type = "non-streaming"
          }
          print(contentString);

          var modelName = context.getVariable("ai.model");
          var requestTokenCount = context.getVariable("ai.requestTokenCount");
          var timeToFirstToken = context.getVariable("ai.timeToFirstToken");
          if (!timeToFirstToken) {
            var request_start_time = context.getVariable('client.received.start.timestamp');
            var timeNow = Date.now();
            timeToFirstToken = timeNow - request_start_time;
            context.setVariable("ai.timeToFirstToken", timeToFirstToken);
          }
          var usageData = getUsageData(contentString);
          if (usageData.model) context.setVariable("ai.model", usageData.model);
          if (usageData.requestTokenCount) context.setVariable("ai.requestTokenCount", usageData.requestTokenCount);
          if (modelName) usageData.model = modelName;
          if (requestTokenCount) usageData.requestTokenCount = requestTokenCount;
          if (timeToFirstToken) usageData.timeToFirstToken = timeToFirstToken;

          if (usageData.responseTokenCount > 0) {
            var costCenter = context.getVariable("ai.costCenter");
            if (costCenter)
              usageData.costCenter = costCenter;
            else
              usageData.costCenter = "unknown";

            context.setVariable("ai.responseTokenCount", usageData.responseTokenCount);
            usageData.totalTokenCount = usageData.requestTokenCount + usageData.responseTokenCount;
            context.setVariable("ai.totalTokenCount", usageData.totalTokenCount.toString());
            usageData.type = type;
            print("Sending analytics data: " + JSON.stringify(usageData));
            var host = context.getVariable("originalHostName");
            var headers = {"Content-Type": "application/json"};
            var apiKey = context.getVariable("verifyapikey.VA-VerifyKey.client_id");
            if (apiKey) {
              headers["x-api-key"] = apiKey;
            }
            var myRequest = new Request('https://' + host + "/ai-analytics","POST", headers, JSON.stringify(usageData));
            print("Sending to: " + 'https://' + host + "/ai-analytics");
            httpClient.send(myRequest);
          }
        includeUrl: jsc://ai-functions.js
  - name: JS-CheckModel
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-CheckModel
        displayName: JS-CheckModel
        properties: {}
        source: |

          var allowed_model_patterns = context.getVariable("propertyset.ai.AllowedModelPatterns");
          var denied_model_patterns = context.getVariable("propertyset.ai.DeniedModelPatterns");
          var override_model = context.getVariable("propertyset.ai.OverrideModel");
          var default_model = context.getVariable("propertyset.ai.DefaultModel");
          if (!allowed_model_patterns) allowed_model_patterns = context.getVariable("ai.allowedModelPatterns");
          if (!denied_model_patterns) denied_model_patterns = context.getVariable("ai.deniedModelPatterns");
          if (!override_model) override_model = context.getVariable("ai.overrideModel");
          if (!default_model) default_model = context.getVariable("ai.defaultModel");

          var url = context.getVariable("proxy.url");
          var requestContent = request.content.asJSON;
          var callType = "googlecloud";
          var callStreaming = "non-streaming";
          if (url.toLowerCase().includes("/chat/completions")) callType = "oai";
          if (url.toLowerCase().includes("stream") || (requestContent && requestContent["stream"] == true)) callStreaming = "streaming";

          var requestConfig = {
            url: url,
            type: callType,
            requestContent: requestContent,
            allowedModelPatterns: allowed_model_patterns,
            deniedModelPatterns: denied_model_patterns
          }

          var allowResult = testAllowedModels(requestConfig);
          var denyResult = testDeniedModels(requestConfig);
          var promptInfo = getPrompts(requestContent);
          var modelName = getModelName(url, request.content);

          context.setVariable("ai.model", modelName);
          context.setVariable("ai.requestType", callStreaming);
          context.setVariable("ai.apiType", callType);

          if (promptInfo.userPrompt)
            context.setVariable("ai.requestPrompt", promptInfo.userPrompt);
          else
            print("Could not find user prompt!");

          if (!allowResult) {
            print("Model not allowed!");
            context.setVariable("response.status.code", 403);
            throw "Model not allowed!";
          }

          if (!denyResult) {
            print("Model denied!");
            context.setVariable("response.status.code", 403);
            throw "Model denied!";
          }

          print("Default_model: " + default_model);
          print("Request model: " + requestContent["model"]);

          if (override_model && override_model != "NONE" && callType == "oai") {
            requestContent["model"] = override_model;
            context.setVariable('request.content', JSON.stringify(requestContent));
          } else if (default_model && default_model != "NONE" && !requestContent["model"] && callType == "oai") {
            print("Default model set: " + default_model);
            requestContent["model"] = default_model;
            context.setVariable('request.content', JSON.stringify(requestContent));
          }
        includeUrl: jsc://ai-functions.js
  - name: JS-GetResponse
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-GetResponse
        displayName: JS-GetResponse
        properties: {}
        source: "

          \    var responseContent = response.content.asJSON;

          \    var responseText = getResponse(responseContent);

          \    context.setVariable(\"sdp.text\", responseText);

          \  "
        includeUrl: jsc://ai-functions.js
  - name: JS-SetMaskedRequest
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetMaskedRequest
        displayName: JS-SetMaskedRequest
        properties: {}
        source: "     var maskedResponseObj =
          JSON.parse(context.getVariable(\"sensitiveDataProtectionResponse.cont\
          ent\"));

          \    print(\"Masked response JSON: \"+
          JSON.stringify(maskedResponseObj));


          \    if (maskedResponseObj[\"item\"]) {

          \      if (maskedResponseObj[\"item\"][\"value\"]) {

          \        var requestContent = request.content.asJSON;

          \        var maskedRequestContent = setPrompt(requestContent,
          maskedResponseObj[\"item\"][\"value\"]);

          \        context.setVariable('request.content',
          JSON.stringify(maskedRequestContent));

          \      }

          \    }

          \  "
        includeUrl: jsc://ai-functions.js
  - name: JS-SetResponse
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetResponse
        displayName: JS-SetResponse
        properties: {}
        source: "

          \    var maskedResponseObj =
          JSON.parse(context.getVariable(\"sensitiveDataProtectionResponse.cont\
          ent\"));

          \    var responseContent = response.content.asJSON;

          \        if (maskedResponseObj[\"item\"]) {

          \      if (maskedResponseObj[\"item\"][\"value\"]) {

          \        var maskedResponse = setResponse(responseContent,
          maskedResponseObj[\"item\"][\"value\"]);

          \        context.setVariable(\"response.content\",
          JSON.stringify(maskedResponse));

          \      }

          \    }

          \  "
        includeUrl: jsc://ai-functions.js
  - name: KVM-LoadConfig
    type: KeyValueMapOperations
    content:
      keyValueMapOperations:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: KVM-LoadConfig
          mapIdentifier: AI-Config
        displayName: KVM-LoadConfig
        properties: {}
        exclusiveCache: "false"
        expiryTimeInSecs: "10"
        initialEntries:
          entry:
            - key:
                parameter: AllowedModelPatterns
              setValue: ALL
            - key:
                parameter: DeniedModelPatterns
              setValue: NONE
            - key:
                parameter: OverrideModel
              setValue: NONE
            - key:
                parameter: DefaultModel
              setValue: google/gemini-flash-latest
            - key:
                parameter: FallbackModel
              setValue: google/gemini-flash-latest
        get:
          - metadata:
              assignTo: ai.allowedModelPatterns
              index: "1"
            key:
              parameter: AllowedModelPatterns
          - metadata:
              assignTo: ai.deniedModelPatterns
              index: "1"
            key:
              parameter: DeniedModelPatterns
          - metadata:
              assignTo: ai.overrideModel
              index: "1"
            key:
              parameter: OverrideModel
          - metadata:
              assignTo: ai.defaultModel
              index: "1"
            key:
              parameter: DefaultModel
          - metadata:
              assignTo: ai.fallbackModel
              index: "1"
            key:
              parameter: FallbackModel
        scope: environment
  - name: SC-SensitiveDataProtection
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-SensitiveDataProtection
        displayName: SC-SensitiveDataProtection
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: POST
            payload:
              metadata:
                contentType: application/json
              value: "

                \        {

                \          \"item\": {

                \            \"value\": \"{sdp.text}\"

                \          },

                \          \"deidentifyConfig\":{

                \            \"infoTypeTransformations\":{

                \              \"transformations\":[

                \                {

                \                  \"infoTypes\":[

                \                    {

                \                      \"name\":\"EMAIL_ADDRESS\"

                \                    }

                \                  ],

                \                  \"primitiveTransformation\":{

                \                    \"characterMaskConfig\":{

                \                      \"maskingCharacter\":\"*\",

                \                      \"reverseOrder\":false,

                \                      \"charactersToIgnore\":[

                \                        {

                \                          \"charactersToSkip\":\"@\"

                \                        }

                \                      ]

                \                    }

                \                  }

                \                }

                \              ]

                \            }

                \          },

                \          \"inspectConfig\": {

                \            \"infoTypes\": [

                \              {

                \                \"name\":\"EMAIL_ADDRESS\"

                \              }

                \            ],

                \            \"minLikelihood\": \"POSSIBLE\",

                \            \"limits\": {

                \              \"maxFindingsPerItem\": 0

                \            },

                \            \"includeQuote\": true

                \          }

                \        }

                \      "
        response: sensitiveDataProtectionResponse
        httpTargetConnection:
          properties: {}
          url: https://dlp.googleapis.com/v2/projects/{organization.name}/content:deidentify
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
resources:
  - name: ai-functions.js
    type: jsc
    content: |
      function getModelName(urlString, contentString) {
        var modelName = "unknown";
        if (urlString && urlString.includes("/models/")) {
          // claude url format
          var urlPieces = urlString.split("/models/");
          if (urlPieces.length > 1) {
            var urlPieces2 = urlPieces[1].split(":");
            if (urlPieces2.length > 0) {
              modelName = urlPieces2[0];
            }
          }
        } else if (contentString) {
          try {
            var contentData = JSON.parse(contentString);
            if (contentData && contentData["model"]) modelName = contentData["model"];
            if (modelName.includes("/")) {
              var modelNamePieces = modelName.split("/");
              modelName = modelNamePieces[modelNamePieces.length - 1];
            }
          } catch (e) {}
        }

        return modelName;
      }

      function getPrompts(contentData) {
        var promptInfo = {
          userPrompt: "",
          allUserPrompts: "",
        };

        if (contentData && contentData["contents"]) {
          // gemini format
          for (i = contentData["contents"].length - 1; i >= 0; i--) {
            var content = contentData["contents"][i];
            if (
              content &&
              content["role"] &&
              content["role"].toLowerCase() == "user" &&
              content["parts"]
            ) {
              for (p = content["parts"].length - 1; p >= 0; p--) {
                var part = content["parts"][p];
                if (!promptInfo.userPrompt && content["parts"][p]["text"]) {
                  promptInfo.userPrompt = content["parts"][p]["text"];
                }

                if (content["parts"][p]["text"]) {
                  promptInfo.allUserPrompts += " " + content["parts"][p]["text"];
                }
              }
            }
          }
        } else if (contentData && contentData["messages"]) {
          // oapi format
          for (i = contentData["messages"].length - 1; i >= 0; i--) {
            var message = contentData["messages"][i];
            if (message && message["role"] && message["role"].toLowerCase() == "user") {
              if (!promptInfo.userPrompt && message["content"]) {
                promptInfo.userPrompt = message["content"];
              }

              if (message["content"]) {
                promptInfo.allUserPrompts += " " + message["content"];
              }
            }
          }
        }

        return promptInfo;
      }

      function setPrompt(contentData, userPrompt) {
        if (contentData && contentData["contents"]) {
          // gemini format
          for (i = contentData["contents"].length - 1; i >= 0; i--) {
            var content = contentData["contents"][i];
            if (
              content &&
              content["role"] &&
              content["role"].toLowerCase() == "user" &&
              content["parts"]
            ) {
              for (p = content["parts"].length - 1; p >= 0; p--) {
                var part = content["parts"][p];
                if (content["parts"][p]["text"]) {
                  content["parts"][p]["text"] = userPrompt;
                  break;
                }
              }
            }
          }
        } else if (contentData && contentData["messages"]) {
          // oapi format
          for (i = contentData["messages"].length - 1; i >= 0; i--) {
            var message = contentData["messages"][i];
            if (message && message["role"] && message["role"].toLowerCase() == "user") {
              if (message["content"]) {
                message["content"] = userPrompt;
                break;
              }
            }
          }
        }

        return contentData;
      }

      function getResponse(contentData) {
        var responseText = "";

        if (contentData && contentData["candidates"] && contentData["candidates"].length > 0) {
          // gemini format
          for (i = contentData["candidates"].length - 1; i >= 0; i--) {
            var candidate = contentData["candidates"][i];
            if (
              candidate &&
              candidate["content"] &&
              candidate["content"]["parts"] &&
              candidate["content"]["parts"].length > 0
            ) {
              for (p = candidate["content"]["parts"].length - 1; p >= 0; p--) {
                var part = candidate["content"]["parts"][p];
                if (part && part["text"]) {
                  responseText = part["text"];
                  break;
                }
              }
            }
          }
        } else if (contentData && contentData["choices"] && contentData["choices"].length > 0) {
          // openmodel format
          for (i = contentData["choices"].length - 1; i >= 0; i--) {
            var choice = contentData["choices"][i];
            if (choice && choice["message"] && choice["message"]["content"]) {
              responseText = choice["message"]["content"];
              break;
            }
          }
        } else if (contentData && contentData["content"] && contentData["content"].length > 0) {
          // claude format
          for (i = contentData["content"].length - 1; i >= 0; i--) {
            var content = contentData["content"][i];
            if (content && content["type"] == "text") {
              responseText = content["text"];
              break;
            }
          }
        }

        return responseText;
      }

      function setResponse(contentData, content) {
        if (contentData && contentData["candidates"] && contentData["candidates"].length > 0) {
          // gemini format
          for (i = contentData["candidates"].length - 1; i >= 0; i--) {
            var candidate = contentData["candidates"][i];
            if (
              candidate &&
              candidate["content"] &&
              candidate["content"]["parts"] &&
              candidate["content"]["parts"].length > 0
            ) {
              for (p = candidate["content"]["parts"].length - 1; p >= 0; p--) {
                var part = candidate["content"]["parts"][p];
                if (part && part["text"]) {
                  part["text"] = content;
                  break;
                }
              }
            }
          }
        } else if (contentData && contentData["choices"] && contentData["choices"].length > 0) {
          // openmodel format
          for (i = contentData["choices"].length - 1; i >= 0; i--) {
            var choice = contentData["choices"][i];
            if (choice && choice["message"] && choice["message"]["content"]) {
              choice["message"]["content"] = content;
              break;
            }
          }
        } else if (contentData && contentData["content"] && contentData["content"].length > 0) {
          // claude format
          for (i = contentData["content"].length - 1; i >= 0; i--) {
            var claudeContent = contentData["content"][i];
            if (claudeContent && claudeContent["type"] == "text") {
              claudeContent["text"] = content;
              break;
            }
          }
        }

        return contentData;
      }

      function getUsageData(contentString) {
        var usageData = {
          model: "",
          requestTokenCount: 0,
          responseTokenCount: 0,
          totalTokenCount: 0,
        };

        if (
          contentString &&
          contentString != "[DONE]" &&
          !contentString.startsWith("event: content_block_delta") &&
          !contentString.startsWith("event: ping") &&
          !contentString.startsWith("event: content_block_start") &&
          !contentString.startsWith("event: content_block_stop") &&
          !contentString.startsWith("event: message_stop")
        ) {
          contentString = contentString.replace("data: ", "");
          contentString = contentString.replace("event: message_delta data:", "");
          contentString = contentString.replace("event: message_delta", "");
          contentString = contentString.replace("event: message_start", "");

          try {
            var contentData = JSON.parse(contentString);

            // model
            if (contentData["model"]) {
              usageData.model = contentData["model"];
            }
            if (contentData["modelVersion"]) {
              usageData.model = contentData["modelVersion"];
            }
            if (contentData["message"] && contentData["message"]["model"]) {
              usageData.model = contentData["message"]["model"];
            }
            if (usageData.model.includes("/")) {
              var modelNamePieces = usageData.model.split("/");
              usageData.model = modelNamePieces[modelNamePieces.length - 1];
            }

            // requestTokenCount
            // openmodels
            if (contentData["usage"] && contentData["usage"]["prompt_tokens"]) {
              usageData.requestTokenCount = contentData["usage"]["prompt_tokens"];
            }
            // claude
            if (
              contentData["message"] &&
              contentData["message"]["usage"] &&
              contentData["message"]["usage"]["input_tokens"]
            ) {
              usageData.requestTokenCount = contentData["message"]["usage"]["input_tokens"];
            }
            if (contentData["usage"] && contentData["usage"]["input_tokens"]) {
              usageData.requestTokenCount = contentData["usage"]["input_tokens"];
            }
            // gemini API
            if (contentData["usageMetadata"] && contentData["usageMetadata"]["promptTokenCount"]) {
              usageData.requestTokenCount = contentData["usageMetadata"]["promptTokenCount"];
            }

            // responseTokenCount
            // openmodels
            if (contentData["usage"] && contentData["usage"]["completion_tokens"])
              usageData.responseTokenCount = contentData["usage"]["completion_tokens"];
            // claude
            if (contentData["usage"] && contentData["usage"]["output_tokens"]) {
              usageData.responseTokenCount = contentData["usage"]["output_tokens"];
            }
            // gemini
            if (contentData["usageMetadata"] && contentData["usageMetadata"]["candidatesTokenCount"]) {
              usageData.responseTokenCount = contentData["usageMetadata"]["candidatesTokenCount"];
            }
          } catch (e) {
            print("Exception in getUsageData: " + JSON.stringify(e));
          }
        }

        return usageData;
      }

      function testAllowedModels(requestInfo) {
        var result = true;
        if (requestInfo.allowedModelPatterns && requestInfo.allowedModelPatterns != "ALL") {
          result = false;
          var patterns = requestInfo.allowedModelPatterns.split(";");
          for (var i = 0; i < patterns.length; i++) {
            var pattern = patterns[i];
            // var patternRegex = new RegExp(pattern);
            if (requestInfo.type == "googlecloud") {
              if (requestInfo.url.includes(pattern)) {
                result = true;
                break;
              }
              // if (patternRegex.test(requestInfo.url)) {
              //   result = true;
              //   break;
              // }
            } else if (requestInfo.type == "oai" && requestInfo.requestContent["model"]) {
              if (requestInfo.requestContent["model"].includes(pattern)) {
                result = true;
                break;
              }
            }
          }
        }

        return result;
      }

      function testDeniedModels(requestInfo) {
        var result = true;
        if (requestInfo.deniedModelPatterns && requestInfo.deniedModelPatterns != "NONE") {
          var patterns = requestInfo.deniedModelPatterns.split(";");
          for (var i = 0; i < patterns.length; i++) {
            var pattern = patterns[i];
            // var patternRegex = new RegExp(pattern);
            if (requestInfo.type == "googlecloud") {
              if (requestInfo.url.includes(pattern)) {
                result = false;
                break;
              }
            } else if (requestInfo.type == "oai" && requestInfo.requestContent["model"]) {
              if (requestInfo.requestContent["model"].includes(pattern)) {
                result = false;
                break;
              }
            } else if (requestInfo.type == "oai") {
              result = false;
              break;
            }
          }
        }

        return result;
      }

      // this is to only export the function if in node
      if (typeof exports !== "undefined") {
        exports.getModelName = getModelName;
        exports.getPrompts = getPrompts;
        exports.setPrompt = setPrompt;
        exports.getResponse = getResponse;
        exports.setResponse = setResponse;
        exports.getUsageData = getUsageData;
        exports.testAllowedModels = testAllowedModels;
        exports.testDeniedModels = testDeniedModels;
      }
  - name: set-masked-prompt.js
    type: jsc
    content: |-
      var maskedResponseObj = JSON.parse(context.getVariable("sensitiveDataProtectionResponse.content"));
      print("sdp response json: "+ JSON.stringify(maskedResponseObj));

      if (maskedResponseObj["item"] && maskedResponseObj["item"]["value"]) {
        context.setVariable("llm.promptInput", maskedResponseObj["item"]["value"]);
      }
  - name: ai.properties
    type: properties
    content: |
      AllowedModelPatterns={AllowedModelPatterns}
      DeniedModelPatterns={DeniedModelPatterns}
      OverrideModel={OverrideModel}
      DefaultModel={DefaultModel}
      FallbackModel={FallbackModel}
tests: []
