name: general-auth
displayName: Authentication Key Header
type: feature
description: Applies an API key header authentication to any normal, non-LLM proxy.
documentation: |
  This feature applies API key header authentication and authorization to the proxy flow.

  **Prerequisites**
  None.

  **Inputs**
  - An API product configured for the current proxy, optionally with quota information.

  **Outputs**
  - If the key is not found in the configured header, or is not valid for the current call, then a fault is raised with response code 401.
  - If quota information is found, it is loaded into the **Apigee variables quota.limit, quota.interval, and quota.timeunit**.
priority: 1
categories:
  - security
parameters:
  - name: API_KEY_HEADER_NAME
    description: The header where the api key is checked.
    default: x-api-key
    examples:
      - x-api-key
      - x-apikey
defaultEndpoint:
  name: default
  basePath: /feature-auth-key-header-v1
  routes:
    - name: default
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: VA-VerifyKey
          condition: request.verb != "OPTIONS"
        - name: AM-RemoveKey
          condition: request.verb != "OPTIONS"
        - name: AM-LoadQuota
          condition: request.verb != "OPTIONS"
  faultRules: []
endpoints: []
targets: []
policies:
  - name: AM-LoadQuota
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-LoadQuota
        displayName: AM-LoadQuota
        properties: {}
        assignVariable:
          - name: quota.limit
            ref: verifyapikey.VA-VerifyKey.apiproduct.developer.quota.limit
          - name: quota.interval
            ref: verifyapikey.VA-VerifyKey.apiproduct.developer.quota.interval
          - name: quota.timeunit
            ref: verifyapikey.VA-VerifyKey.apiproduct.developer.quota.timeunit
        ignoreUnresolvedVariables: "true"
  - name: AM-RemoveKey
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-RemoveKey
        displayName: AM-RemoveKey
        properties: {}
        remove:
          headers:
            header:
              metadata:
                name: x-api-key
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: VA-VerifyKey
    type: VerifyAPIKey
    content:
      verifyApiKey:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: VA-VerifyKey
        displayName: VA-VerifyKey
        properties: {}
        apiKey:
          metadata:
            ref: request.header.x-api-key
resources: []
tests: []
