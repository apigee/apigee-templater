name: llm-prompt-pii-mask
displayName: LLM PII Data Masking
type: feature
description: |
  This feature masks PII data email addresses and telephone numbers from
  incoming prompt requests using GCP Data Loss Prevention.

  **Prerequisites**
  - Enable DLP in your GCP project. You can do this with this command:
  ```sh
  gcloud services enable dlp.googleapis.com
  ```

  **Inputs**
  - The input variable **llm.promptInput** will be sent to DLP to be masked.

  **Outputs**
  - The DLM masked result is set back into the variable **llm.promptInput**.
categories:
  - llm
parameters:
  - name: PROJECT_ID
    displayName: DLP Project Id
    description: Configuration input for PROJECT_ID
    default: apigee-prod13
    examples: []
defaultEndpoint:
  name: default
  basePath: /feature-llm-promptmask-v1
  routes:
    - name: default
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: SC-SensitiveDataProtection
        - name: JS-SetMaskedRequest
  faultRules: []
endpoints: []
targets: []
policies:
  - name: JS-SetMaskedRequest
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetMaskedRequest
        displayName: JS-SetMaskedRequest
        properties: {}
        resourceUrl: jsc://set-masked-prompt.js
  - name: SC-SensitiveDataProtection
    type: ServiceCallout
    content:
      serviceCallout:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: SC-SensitiveDataProtection
        displayName: SC-SensitiveDataProtection
        properties: {}
        request:
          metadata:
            clearPayload: "true"
            variable: myRequest
          ignoreUnresolvedVariables: "false"
          set:
            verb: POST
            payload:
              metadata:
                contentType: application/json
              text: "

                \        {

                \          \"item\": {

                \            \"value\": \"{llm.promptInput}\"

                \          },

                \          \"deidentifyConfig\":{

                \            \"infoTypeTransformations\":{

                \              \"transformations\":[

                \                {

                \                  \"infoTypes\":[

                \                    {

                \                      \"name\":\"EMAIL_ADDRESS\"

                \                    }

                \                  ],

                \                  \"primitiveTransformation\":{

                \                    \"characterMaskConfig\":{

                \                      \"maskingCharacter\":\"*\",

                \                      \"reverseOrder\":false,

                \                      \"charactersToIgnore\":[

                \                        {

                \                          \"charactersToSkip\":\"@\"

                \                        }

                \                      ]

                \                    }

                \                  }

                \                },

                \                {

                \                  \"infoTypes\":[

                \                    {

                \                      \"name\":\"PHONE_NUMBER\"

                \                    }

                \                  ],

                \                  \"primitiveTransformation\":{

                \                    \"replaceConfig\":{

                \                      \"newValue\":{

                \                        \"stringValue\":\"[telephone-number]\"

                \                      }

                \                    }

                \                  }

                \                }

                \              ]

                \            }

                \          },

                \          \"inspectConfig\": {

                \            \"infoTypes\": [

                \              {

                \                \"name\": \"PHONE_NUMBER\"

                \              },

                \              {

                \                \"name\":\"EMAIL_ADDRESS\"

                \              }

                \            ],

                \            \"minLikelihood\": \"POSSIBLE\",

                \            \"limits\": {

                \              \"maxFindingsPerItem\": 0

                \            },

                \            \"includeQuote\": true

                \          }

                \        }

                \      "
        response: sensitiveDataProtectionResponse
        httpTargetConnection:
          properties: {}
          url: https://dlp.googleapis.com/v2/projects/{propertyset.dlp.PROJECT_ID}/content:deidentify
          authentication:
            googleAccessToken:
              scopes:
                scope: https://www.googleapis.com/auth/cloud-platform
resources:
  - name: set-masked-prompt.js
    type: jsc
    content: |-
      var maskedResponseObj = JSON.parse(context.getVariable("sensitiveDataProtectionResponse.content"));
      print("sdp response json: "+ JSON.stringify(maskedResponseObj));

      if (maskedResponseObj["item"] && maskedResponseObj["item"]["value"]) {
        context.setVariable("llm.promptInput", maskedResponseObj["item"]["value"]);
      }
  - name: dlp.properties
    type: properties
    content: |
      PROJECT_ID={PROJECT_ID}
tests: []
