name: llm-response-sanitize
displayName: LLM Response Sanitization
type: feature
description: Feature-LLM-SanitizeResponse-v1
categories:
  - llm
parameters:
  - name: TEMPLATE_ID
    displayName: TEMPLATE_ID
    description: Configuration input for TEMPLATE_ID
    default: projects/apigee-prod13/locations/europe-west1/templates/default-ma-template
    examples: []
defaultEndpoint:
  name: default
  basePath: /feature-llm-sanitizeresponse-v1
  routes:
    - name: default
  flows:
    - name: PostFlow
      mode: Response
      steps:
        - name: SMR-SanitizeResponse
  faultRules: []
endpoints: []
targets: []
policies:
  - name: SMR-SanitizeResponse
    type: SanitizeModelResponse
    content:
      sanitizeModelResponse:
        metadata:
          async: "false"
          continueOnError: "false"
          enabled: "true"
          name: SMR-SanitizeResponse
        ignoreUnresolvedVariables: "false"
        displayName: SMR-SanitizeResponse
        modelArmor:
          templateName: "{propertyset.model-armor.TEMPLATE_ID}"
        userPromptSource: "{jsonPath('$.contents[-1].parts[-1].text',request.content,true)}"
        llmResponseSource: "{jsonPath('$.candidates[-1].content.parts[-1].text',respons\
          e.content,true)}"
resources:
  - name: model-armor.properties
    type: properties
    content: |
      TEMPLATE_ID={TEMPLATE_ID}
tests: []
