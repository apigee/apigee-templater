name: cors
displayName: CORS
type: feature
description: Applies CORS handling to any proxy.
categories:
  - traffic
parameters:
  - name: ALLOWED_ORIGINS
    description: The allowed origins of clients.
    default: "*"
    examples:
      - "*"
      - "{request.header.origin}"
  - name: ALLOWED_HEADERS
    description: The allowed headers for clients to send.
    default: origin, x-requested-with, accept, content-type
    examples:
      - origin, x-requested-with, accept, content-type
defaultEndpoint:
  name: default
  basePath: /cors
  routes:
    - name: default
  flows:
    - name: PreFlow
      mode: Request
      position: top
      steps:
        - name: CORS-AddCors
  faultRules: []
endpoints: []
targets: []
policies:
  - name: CORS-AddCors
    type: CORS
    content:
      cors:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: CORS-AddCors
        displayName: CORS-AddCors
        allowOrigins: "*"
        allowMethods: GET, PUT, POST, DELETE
        allowHeaders: "*"
        exposeHeaders: "*"
        maxAge: "3628800"
        allowCredentials: "false"
        generatePreflightResponse: "true"
        ignoreUnresolvedVariables: "true"
resources: []
tests: []
