name: llm-auth
displayName: LLM Auth Feature
type: feature
description: The llm-auth feature adds authentication, authorization, quotas and analytics to the LLM access.
documentation: ~|
  Access to the LLM is managed through API Products in Apigee, that grant access and quotas to certain models.

  **Prerequisites**
  - LLM DataCollectors must be created in Apigee Analytics
  ```sh
  PROJECT_ID=YOUR_APIGEE_PROJECT
  apigeecli datacollectors create -d "Model name" -n dc_llm_model -p STRING --org "$PROJECT_ID" --token $(gcloud auth print-access-token)
  apigeecli datacollectors create -d "Total token count" -n dc_llm_total_token_count -p INTEGER --org "$PROJECT_ID" --token $(gcloud auth print-access-token)
  apigeecli datacollectors create -d "Prompt token count" -n dc_llm_prompt_token_count -p INTEGER --org "$PROJECT_ID" --token $(gcloud auth print-access-token)
  apigeecli datacollectors create -d "Total token count" -n dc_llm_response_token_count -p INTEGER --org "$PROJECT_ID" --token $(gcloud auth print-access-token)
  ```

  Important note - in order for streaming LLM access to store streaming LLM token analytics, you must also deploy
  the **LLM-Analytics-v1** in your environment.
categories:
  - llm
parameters: []
defaultEndpoint:
  name: default
  basePath: /llm-auth
  routes:
    - name: default
      target: default
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: VA-VerifyKey
        - name: AM-RemoveKey
        - name: LTQ-QuotaEnforce
    - name: PostFlow
      mode: Response
      steps:
        - name: LTQ-QuotaCount
          condition: response.content != ""
        - name: DC-TokenAnalytics
          condition: response.content != ""
  faultRules: []
defaultTarget:
  name: default
  url: https://aiplatform.googleapis.com/v1/projects/{organization.name}/locations/global/endpoints/openapi/chat/completions
  auth: GoogleAccessToken
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  flows:
    - name: EventFlow
      mode: Response
      steps:
        - name: LTQ-QuotaCountEvent
        - name: JS-SendAnalytics
          condition:
            ratelimit.LTQ-QuotaCountEvent.used.count != "" AND analyticsSent !=
            "true"
  faultRules: []
  httpTargetConnection:
    properties: {}
    url: https://aiplatform.googleapis.com/v1/projects/{organization.name}/locations/global/endpoints/openapi/chat/completions
    authentication:
      googleAccessToken:
        scopes:
          scope: https://www.googleapis.com/auth/cloud-platform
endpoints: []
targets: []
policies:
  - name: AM-RemoveKey
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-RemoveKey
        displayName: AM-RemoveKey
        properties: {}
        remove:
          headers:
            header:
              metadata:
                name: x-api-key
        assignVariable:
          name: originalHostName
          ref: request.header.host
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: DC-TokenAnalytics
    type: DataCapture
    content:
      dataCapture:
        metadata:
          name: DC-TokenAnalytics
          continueOnError: "false"
          enabled: "true"
        displayName: DC-TokenAnalytics
        ignoreUnresolvedVariables: "false"
        capture:
          - collect:
              metadata:
                ref: ratelimit.LTQ-QuotaCount.used.count
                default: "0"
            dataCollector: dc_llm_response_token_count
          - collect:
              metadata:
                ref: ratelimit.LTQ-QuotaCount.model
                default: "0"
            dataCollector: dc_llm_model
  - name: JS-SendAnalytics
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SendAnalytics
        displayName: JS-SendAnalytics
        properties: {}
        resourceUrl: jsc://send-analytics.js
  - name: LTQ-QuotaCount
    type: LLMTokenQuota
    content:
      llmTokenQuota:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: LTQ-QuotaCount
          type: calendar
        displayName: LTQ-QuotaCount
        properties: {}
        useQuotaConfigInApiProduct:
          metadata:
            stepName: VA-VerifyKey
        countOnly: "true"
        sharedName: llm-quota
        distributed: "false"
        synchronous: "false"
        startTime: 2013-08-21 10:00:00
        asynchronousConfiguration:
          syncIntervalInSeconds: "20"
          syncMessageCount: "5"
        llmTokenUsageSource: "{jsonPath('$.usage.completion_tokens',response.content,true)}"
        llmModelSource: "{jsonPath('$.model',request.content,true)}"
  - name: LTQ-QuotaCountEvent
    type: LLMTokenQuota
    content:
      llmTokenQuota:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: LTQ-QuotaCountEvent
          type: calendar
        displayName: LTQ-QuotaCountEvent
        properties: {}
        useQuotaConfigInApiProduct:
          metadata:
            stepName: VA-VerifyKey
        countOnly: "true"
        sharedName: llm-quota
        distributed: "false"
        synchronous: "false"
        startTime: 2013-08-21 10:00:00
        asynchronousConfiguration:
          syncIntervalInSeconds: "20"
          syncMessageCount: "5"
        llmTokenUsageSource:
          "{jsonPath('$.usage.completion_tokens',response.event.curr\
          ent.data,true)}"
        llmModelSource: "{jsonPath('$.model',request.content,true)}"
  - name: LTQ-QuotaEnforce
    type: LLMTokenQuota
    content:
      llmTokenQuota:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: LTQ-QuotaEnforce
          type: calendar
        displayName: LTQ-QuotaEnforce
        properties: {}
        useQuotaConfigInApiProduct:
          metadata:
            stepName: VA-VerifyKey
        enforceOnly: "true"
        sharedName: llm-quota
        distributed: "false"
        synchronous: "false"
        startTime: 2013-08-21 10:00:00
        asynchronousConfiguration:
          syncIntervalInSeconds: "20"
          syncMessageCount: "5"
  - name: VA-VerifyKey
    type: VerifyAPIKey
    content:
      verifyApiKey:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: VA-VerifyKey
        displayName: VA-VerifyKey
        properties: {}
        apiKey:
          metadata:
            ref: request.header.x-api-key
resources:
  - name: send-analytics.js
    type: jsc
    content: |-
      var host = context.getVariable("originalHostName");
      var tokenCount = context.getVariable("ratelimit.LTQ-QuotaCountEvent.used.count");

      var apiKey = context.getVariable("verifyapikey.VA-VerifyKey.client_id");
      var modelName = context.getVariable("ratelimit.LTQ-QuotaEnforce.model");
      var headers = {"x-api-key": apiKey, "content-type": "application/json"};

      if (tokenCount) {
        print("Sending analytics to:" + 'https://' + host + "/llm-analytics-v1");
        print(modelName + " - " + tokenCount);

        var myRequest = new Request('https://' + host + "/llm-analytics-v1","POST", headers, '{"model": "' + modelName + '", "responseTokenCount": "'+ tokenCount + '"}');

        httpClient.send(myRequest);

        context.setVariable("analyticsSent", "true");
      }
tests: []
