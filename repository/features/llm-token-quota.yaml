name: llm-token-quota
displayName: LLM Token Quotas
type: feature
description: |-
  This feature estimates the token length of an input prompt, checks
  the quota in the target pre-flow, and then updates the token in the target
  post-flow.
priority: 150
categories:
  - llm
parameters: []
defaultEndpoint:
  name: default
  basePath: /feature-llm-tokenquota-v1
  routes:
    - name: default
      target: default
  flows: []
  faultRules: []
defaultTarget:
  name: default
  url: https://httpbin.org
  flows:
    - name: PreFlow
      mode: Request
      steps:
        - name: Q-CheckQuota
          condition: quota.limit != null
    - name: PostFlow
      mode: Response
      steps:
        - name: Q-UpdateQuota
          condition: quota.limit != null
    - name: EventFlow
      mode: Response
      steps: []
  faultRules: []
  httpTargetConnection:
    url: https://httpbin.org
endpoints: []
targets: []
policies:
  - name: Q-CheckQuota
    type: Quota
    content:
      quota:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: Q-CheckQuota
        displayName: Q-CheckQuota
        properties: {}
        identifier:
          metadata:
            ref: client_id
        allow:
          metadata:
            countRef: quota.limit
        interval:
          metadata:
            ref: quota.interval
        timeUnit:
          metadata:
            ref: quota.timeunit
        messageWeight:
          metadata:
            ref: llm.promptEstimatedTokenCount
        distributed: "true"
        synchronous: "true"
        countOnly: "true"
        sharedName: token-quota
  - name: Q-UpdateQuota
    type: Quota
    content:
      quota:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: Q-UpdateQuota
          type: calendar
        displayName: Q-UpdateQuota
        properties: {}
        allow:
          metadata:
            count: "2000"
            countRef: request.header.allowed_quota
        interval:
          metadata:
            ref: request.header.quota_count
          value: "1"
        distributed: "false"
        synchronous: "false"
        timeUnit:
          metadata:
            ref: request.header.quota_timeout
          value: month
        startTime: 2013-08-21 10:00:00
        asynchronousConfiguration:
          syncIntervalInSeconds: "20"
          syncMessageCount: "5"
resources: []
tests: []
