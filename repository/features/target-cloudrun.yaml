name: target-cloudrun
displayName: Cloud Run Services
type: feature
description: Turn any Google Cloud Run service into a managed API proxy & product.
documentation: |
  Proxy your Cloud Run services through Apigee with this feature.

  **Prerequisites**
  - When deploying, a service account must be used with `roles/run.invoker' permissions in the Google Cloud project.

  **Inputs**
  None.

  **Outputs
  None.
categories:
  - services
parameters:
  - name: BASE_PATH
    paths:
      - $.endpoints[:1].basePath
    description: The base path to offer the proxy on.
    default: /v1/cloudrun
    examples:
      - /v1/crservice
      - /salesorderservice
  - name: CLOUDRUN_URL
    paths:
      - $.targets[:1].url
      - $.targets[:1].httpTargetConnection.url
      - $.targets[:1].httpTargetConnection.authentication.googleIdToken.audience
    description: The URL of the Cloud Run service to proxy.
    default: https://businessservice-323709580283.europe-west1.run.app
    examples:
      - https://exampleservice-2.us-central1.run.app
      - https://exampleservice-1.europe-west1.run.app
endpoints:
  - name: cloudrun
    basePath: /v1/cloudrun
    routes:
      - name: default
        target: cloudrun
    flows: []
    faultRules: []
targets:
  - name: cloudrun
    url: https://businessservice-323709580283.europe-west1.run.app
    flows: []
    faultRules: []
    httpTargetConnection:
      properties: {}
      url: https://businessservice-323709580283.europe-west1.run.app
      authentication:
        googleIdToken:
          audience: https://businessservice-323709580283.europe-west1.run.app
policies: []
resources: []
tests: []
