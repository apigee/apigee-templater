name: AI-Analytics
displayName: AI Analytics Proxy
type: proxy
categories:
  - llm
  - ai
description: This proxy provides AI analytics data ingestion for streaming LLM
  endpoints (with token usage information from last data frame).
documentation: ~| This proxy provides additional analytics ingestion, if needed,
  for example by streaming LLM endpoints.
parameters: []
endpoints:
  - name: default
    basePath: /ai-analytics
    routes:
      - name: default
    flows:
      - name: PreFlow
        mode: Request
        steps:
          - name: AM-SetVariables
          - name: EV-ExtractToken
          - name: JWT-VerifyToken
          - name: DC-TokenAnalytics
    faultRules: []
targets: []
policies:
  - name: AM-SetVariables
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetVariables
        displayName: AM-SetVariables
        properties: {}
        assignVariable:
          name: private.analyticsSecret
          setValue: ApigeeDemoSecret
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: DC-TokenAnalytics
    type: DataCapture
    content:
      dataCapture:
        metadata:
          name: DC-TokenAnalytics
          continueOnError: "false"
          enabled: "true"
        displayName: DC-TokenAnalytics
        ignoreUnresolvedVariables: "false"
        capture:
          - collect:
              metadata:
                default: "0"
              source: request
              jsonPayload:
                jsonPath: $.model
            dataCollector: dc_llm_model
          - collect:
              metadata:
                default: "0"
              source: request
              jsonPayload:
                jsonPath: $.requestTokenCount
            dataCollector: dc_ai_prompt_token_count
          - collect:
              metadata:
                default: "0"
              source: request
              jsonPayload:
                jsonPath: $.responseTokenCount
            dataCollector: dc_llm_response_token_count
          - collect:
              metadata:
                default: "0"
              source: request
              jsonPayload:
                jsonPath: $.totalTokenCount
            dataCollector: dc_ai_total_token_count
          - collect:
              metadata:
                default: "0"
              source: request
              jsonPayload:
                jsonPath: $.type
            dataCollector: dc_ai_response_type
          - collect:
              metadata:
                default: "0"
              source: request
              jsonPayload:
                jsonPath: $.timeToFirstToken
            dataCollector: dc_ai_time_first_token
  - name: EV-ExtractToken
    type: ExtractVariables
    content:
      extractVariables:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: EV-ExtractToken
        displayName: EV-ExtractToken
        properties: {}
        source: request
        header:
          metadata:
            name: Authorization
          pattern:
            metadata:
              ignoreCase: "false"
            value: Bearer {jwtToken}
        variablePrefix: analytics
        ignoreUnresolvedVariables: "true"
  - name: JWT-VerifyToken
    type: VerifyJWT
    content:
      verifyJwt:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: JWT-VerifyToken
        displayName: JWT-VerifyToken
        algorithm: HS256
        source: analytics.jwtToken
        secretKey:
          setValue:
            metadata:
              ref: private.analyticsSecret
        subject: apigee-analytics
        issuer: urn://apigee-x-JWT-policy-analytics
        audience: analytics
        additionalClaims: {}
resources: []
tests: []
