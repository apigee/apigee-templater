name: AI-Analytics
displayName: AI Analytics Proxy
type: proxy
categories:
  - llm
  - ai
description: This proxy provides AI analytics data ingestion for streaming LLM
  endpoints (with token usage information from last data frame).
documentation: ~| This proxy provides additional analytics ingestion, if needed,
  for example by streaming LLM endpoints.
parameters: []
endpoints:
  - name: default
    basePath: /ai-analytics
    routes:
      - name: default
    flows:
      - name: PreFlow
        mode: Request
        steps:
          - name: VA-VerifyKey
          - name: DC-TokenAnalytics
          - name: EV-ExtractPayload
          - name: AM-SetVariables
          - name: KVM-GetBudgets
          - name: JS-UpdateBudgets
    faultRules: []
targets: []
policies:
  - name: AM-SetVariables
    type: AssignMessage
    content:
      assignMessage:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: AM-SetVariables
        displayName: AM-SetVariables
        properties: {}
        assignVariable:
          - name: ai.costCenterModelBudgetKey
            template: CostCenterModelBudget-{ai.costCenter}-{ai.model}
          - name: ai.costCenterModelUsageKey
            template: CostCenterModelUsage-{ai.costCenter}-{ai.model}
          - name: ai.costCenterBudgetKey
            template: CostCenterBudget-{ai.costCenter}
          - name: ai.costCenterUsageKey
            template: CostCenterUsage-{ai.costCenter}
          - name: ai.userModelBudgetKey
            template: UserModelBudget-{developer.email}-{ai.model}
          - name: ai.userModelUsageKey
            template: UserModelUsage-{developer.email}-{ai.model}
          - name: ai.userBudgetKey
            template: UserBudget-{developer.email}
          - name: ai.userUsageKey
            template: UserUsage-{developer.email}
        source:
          metadata:
            clearPayload: "false"
          value: request
        ignoreUnresolvedVariables: "true"
        assignTo:
          metadata:
            createNew: "false"
            transport: http
            type: request
  - name: DC-TokenAnalytics
    type: DataCapture
    content:
      dataCapture:
        metadata:
          name: DC-TokenAnalytics
          continueOnError: "false"
          enabled: "true"
        displayName: DC-TokenAnalytics
        ignoreUnresolvedVariables: "true"
        capture:
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.model
            dataCollector: dc_ai_model
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.requestTokenCount
            dataCollector: dc_ai_prompt_token_count
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.responseTokenCount
            dataCollector: dc_ai_response_token_count
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.totalTokenCount
            dataCollector: dc_ai_total_token_count
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.type
            dataCollector: dc_ai_response_type
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.timeToFirstToken
            dataCollector: dc_ai_time_first_token
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.costCenter
            dataCollector: dc_ai_cost_center
  - name: EV-ExtractPayload
    type: ExtractVariables
    content:
      extractVariables:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: EV-ExtractPayload
        displayName: EV-ExtractPayload
        properties: {}
        ignoreUnresolvedVariables: "true"
        jsonPayload:
          variable:
            - metadata:
                name: model
              jsonPath: $.model
            - metadata:
                name: costCenter
              jsonPath: $.costCenter
        variablePrefix: ai
  - name: JS-UpdateBudgets
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-UpdateBudgets
        displayName: JS-UpdateBudgets
        properties: {}
        source: "

          var usageData = request.content.asJSON;

          \  "
  - name: KVM-GetBudgets
    type: KeyValueMapOperations
    content:
      keyValueMapOperations:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: KVM-GetBudgets
          mapIdentifier: AI-Config
        displayName: KVM-GetBudgets
        properties: {}
        exclusiveCache: "false"
        expiryTimeInSecs: "300"
        get:
          metadata:
            assignTo: ai.costCenterBudget
            index: "1"
          key:
            parameter:
              metadata:
                ref: myvar
        scope: environment
  - name: VA-VerifyKey
    type: VerifyAPIKey
    content:
      verifyApiKey:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: VA-VerifyKey
        displayName: VA-VerifyKey
        properties: {}
        apiKey:
          metadata:
            ref: request.header.x-api-key
resources: []
tests: []
