name: AI-Analytics
displayName: AI Analytics Proxy
type: proxy
categories:
  - llm
  - ai
description: This proxy provides AI analytics data ingestion for streaming LLM
  endpoints (with token usage information from last data frame).
documentation: ~| This proxy provides additional analytics ingestion, if needed,
  for example by streaming LLM endpoints.
parameters: []
endpoints:
  - name: default
    basePath: /ai-analytics
    routes:
      - name: default
    flows:
      - name: PreFlow
        mode: Request
        steps:
          - name: VA-VerifyKey
          - name: DC-TokenAnalytics
    faultRules: []
targets: []
policies:
  - name: DC-TokenAnalytics
    type: DataCapture
    content:
      dataCapture:
        metadata:
          name: DC-TokenAnalytics
          continueOnError: "false"
          enabled: "true"
        displayName: DC-TokenAnalytics
        ignoreUnresolvedVariables: "false"
        capture:
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.model
            dataCollector: dc_ai_model
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.requestTokenCount
            dataCollector: dc_ai_prompt_token_count
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.responseTokenCount
            dataCollector: dc_ai_response_token_count
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.totalTokenCount
            dataCollector: dc_ai_total_token_count
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.type
            dataCollector: dc_ai_response_type
          - collect:
              source: request
              jsonPayload:
                jsonPath: $.timeToFirstToken
            dataCollector: dc_ai_time_first_token
  - name: VA-VerifyKey
    type: VerifyAPIKey
    content:
      verifyApiKey:
        metadata:
          continueOnError: "false"
          enabled: "true"
          name: VA-VerifyKey
        displayName: VA-VerifyKey
        properties: {}
        apiKey:
          metadata:
            ref: request.header.x-api-key
resources: []
tests: []
