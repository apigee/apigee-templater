name: SimpleProxy-v1
displayName: SimpleProxy-v1
type: proxy
categories: []
description: SimpleProxy-v1
documentation: ""
parameters: []
endpoints:
  - name: default
    basePath: /v1/simple-proxy
    routes:
      - name: get
        condition: proxy.pathsuffix = "/get"
        target: httpbin
      - name: default
        target: default
    flows:
      - name: PostFlow
        mode: Response
        steps:
          - name: JS-SetResponse
    faultRules: []
targets:
  - name: default
    url: https://mocktarget.apigee.net
    flows: []
    faultRules: []
    httpTargetConnection:
      url: https://mocktarget.apigee.net
  - name: httpbin
    url: https://httpbin.org
    flows: []
    faultRules: []
    httpTargetConnection:
      url: https://httpbin.org
policies:
  - name: JS-SetResponse
    type: Javascript
    content:
      javascript:
        metadata:
          continueOnError: "false"
          enabled: "true"
          timeLimit: "200"
          name: JS-SetResponse
        displayName: JS-SetResponse
        properties: {}
        source: |-
          print("hello world!!");

          context.proxyResponse.content += "hello world!";
tests: []
